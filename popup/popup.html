<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="pt-popup">
    <div class="pt-popup-header">
      <span class="pt-popup-logo">🍞</span>
      <span class="pt-popup-name">PostToast</span>
    </div>
    <p class="pt-popup-tagline">Roasting LinkedIn, one post at a time.</p>

    <div class="pt-toggle-row">
      <span>Extension</span>
      <label class="pt-switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="pt-slider"></span>
      </label>
    </div>

    <div class="pt-status" id="status">Active — scoring posts</div>

    <div class="pt-footer">
      <a href="https://posttoast.app" target="_blank">posttoast.app</a>
      <span class="pt-footer-sep">·</span>
      <a href="https://buymeacoffee.com/leeking" target="_blank" class="pt-bmac-link">☕ Fuel the roast</a>
      <span id="version">v...</span>
    </div>

    <!-- Feedback Section -->
    <div class="pt-feedback-section">
      <button class="pt-feedback-toggle" id="feedbackToggle">💬 Send Feedback</button>
      
      <div class="pt-feedback-form" id="feedbackForm" style="display: none;">
        <div class="pt-feedback-categories">
          <button class="pt-category-btn" data-category="Bug Report">🐛 Bug Report</button>
          <button class="pt-category-btn" data-category="Feature Request">💡 Feature Request</button>
        </div>
        
        <textarea 
          class="pt-feedback-textarea" 
          id="feedbackText" 
          placeholder="What's not working? What should we add?"
          rows="4"
        ></textarea>
        
        <div class="pt-feedback-actions">
          <button class="pt-feedback-submit" id="feedbackSubmit">Send via Email</button>
          <button class="pt-feedback-copy" id="feedbackCopy">Copy to Clipboard</button>
        </div>
        
        <div class="pt-feedback-thanks" id="feedbackThanks" style="display: none;">
          Thanks for your feedback! 🙏
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
